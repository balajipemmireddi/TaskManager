# Application Name
spring.application.name=Team Task Manager

# Server Configuration
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskmanager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:VGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1mb3ItdGVhbS10YXNrLW1hbmFnZXItand0LXRva2Vucy1wcm9kdWN0aW9u}
jwt.expiration=86400000

# Frontend URL for CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.taskmanager=INFO
logging.level.org.springframework.security=DEBUG
